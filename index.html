<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>“好房子”建设标准可视化导览</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>中国住建部“好房子”建设标准 · 可交互讲解详情图</h1>
    <p>信息图 + 报表 + 注释框 + 示意图｜用于展厅与多媒体设备宣传推广</p>
  </header>
  <main class="layout">
    <aside class="col left">
      <section class="card photo-card">
        <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1400&q=80" alt="住宅示意图" />
        <p class="caption">融合写实照片与图形叠层，突出“住有宜居”场景。</p>
      </section>
      <section class="card" id="policyTimeline"></section>
      <section class="card" id="sourcePanel"></section>
    </aside>

    <section class="col center">
      <section class="card hero">
        <h2>“好房子”四维目标</h2>
        <p class="muted">依据“安全、舒适、绿色、智慧”构建多层指标体系，配套“好标准、好设计、好材料、好建造、好运维”执行链条。</p>
        <div id="coreBadges" class="core-badges"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h3>指标看板（交互切换）</h3>
          <div id="tabBar" class="tab-bar"></div>
        </div>
        <div id="dimensionView" class="dimension-view"></div>
      </section>

      <section class="card">
        <h3>项目实施流程图（触摸点选）</h3>
        <div id="flowMap" class="flow-map"></div>
        <article id="flowDetail" class="annot-box"></article>
      </section>
    </section>

    <aside class="col right">
      <section class="card" id="reportPanel"></section>
      <section class="card" id="scenarioPanel"></section>
      <section class="card" id="devicePanel"></section>
    </aside>
  </main>
  <script src="./app.js"></script>
</body>
</html>
